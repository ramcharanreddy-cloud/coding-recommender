<!DOCTYPE html>
<html>
<head>
    <title>AI Coding Recommender</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e1e2f, #121212);
            color: white;
            text-align: center;
            padding-top: 80px;
        }

        .container {
            background: #1f1f2e;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,255,204,0.3);
        }

        h1 {
            margin-bottom: 20px;
        }

        select, button {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        button {
            background: #00ffcc;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00ddb3;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #121212;
            display: none;
        }

        .top {
            font-size: 20px;
            color: #00ffcc;
        }

        .second {
            font-size: 16px;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🚀 Coding Recommender</h1>

    <select id="interest">
        <option value="AI">AI</option>
        <option value="Web">Web</option>
        <option value="App">App</option>
        <option value="Competitive">Competitive</option>
    </select>

    <select id="level">
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
    </select>

    <select id="goal">
        <option value="Learning">Learning</option>
        <option value="Job">Job</option>
        <option value="Competitive">Competitive</option>
    </select>

    <button onclick="getData()">Get Recommendation</button>

    <div id="result">
        <div class="top" id="topResult"></div>
        <div class="second" id="secondResult"></div>
    </div>
</div>

<script>
async function getData() {
    let interest = document.getElementById("interest").value;
    let level = document.getElementById("level").value;
    let goal = document.getElementById("goal").value;

    let url = `https://coding-recommender.onrender.com/predict?interest=${interest}&level=${level}&goal=${goal}`;

    try {
        let res = await fetch(url);
        let data = await res.json();

        document.getElementById("result").style.display = "block";

        document.getElementById("topResult").innerText =
            "🔥 " + data.top_1.language + " (" + data.top_1.confidence + "%)";

        document.getElementById("secondResult").innerText =
            "⭐ " + data.top_2.language + " (" + data.top_2.confidence + "%)";

    } catch (error) {
        console.error(error);
        document.getElementById("result").style.display = "block";
        document.getElementById("topResult").innerText = "Error loading data";
        document.getElementById("secondResult").innerText = "";
    }
}
</script>

</body>
</html>
