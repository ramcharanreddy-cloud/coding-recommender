<!DOCTYPE html>
<html>
<head>
    <title>AI Coding Recommender</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
            padding-top: 60px;
        }

        .container {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 20px;
            width: 380px;
            margin: auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(0,255,204,0.3);
        }

        h1 {
            margin-bottom: 20px;
        }

        select, button {
            width: 90%;
            padding: 12px;
            margin: 10px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }

        select {
            background: #1f1f2e;
            color: white;
        }

        button {
            background: linear-gradient(45deg, #00ffcc, #00c3ff);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        #loading {
            display: none;
            margin-top: 15px;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: #121212;
            display: none;
        }

        .top {
            font-size: 22px;
            color: #00ffcc;
        }

        .second {
            font-size: 16px;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🚀 Coding Recommender</h1>

    <select id="interest">
        <option value="AI">AI</option>
        <option value="Web">Web</option>
        <option value="App">App</option>
        <option value="Competitive">Competitive</option>
    </select>

    <select id="level">
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
    </select>

    <select id="goal">
        <option value="Learning">Learning</option>
        <option value="Job">Job</option>
        <option value="Competitive">Competitive</option>
    </select>

    <button onclick="getData()">Get Recommendation</button>

    <div id="loading">⏳ Getting recommendation...</div>

    <div id="result">
        <div class="top" id="topResult"></div>
        <div class="second" id="secondResult"></div>
    </div>
</div>

<script>
async function getData() {
    let interest = document.getElementById("interest").value;
    let level = document.getElementById("level").value;
    let goal = document.getElementById("goal").value;

    let url = `https://coding-recommender.onrender.com/predict?interest=${interest}&level=${level}&goal=${goal}`;

    document.getElementById("loading").style.display = "block";
    document.getElementById("result").style.display = "none";

    try {
        let res = await fetch(url);
        let data = await res.json();

        document.getElementById("loading").style.display = "none";
        document.getElementById("result").style.display = "block";

        document.getElementById("topResult").innerText =
            "🔥 " + data.top_1.language + " (" + data.top_1.confidence + "%)";

        document.getElementById("secondResult").innerText =
            "⭐ " + data.top_2.language + " (" + data.top_2.confidence + "%)";

    } catch (error) {
        console.error(error);
        document.getElementById("loading").innerText = "❌ Error loading data";
    }
}
</script>

</body>
</html>
